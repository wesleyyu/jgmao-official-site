log_format  header_auth  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" "auth=$http_authorization"';
server {
        listen 80;
        server_name open.jgmao.com;
        return 301 https://$host$request_uri;
}
server {
	client_max_body_size 20m;

        listen 443 ssl;
        server_name open.jgmao.com;
        ssl_certificate ssl/open.jgmao.com.pem;
        ssl_certificate_key ssl/open.jgmao.com.key;
        ssl_session_timeout 5m;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
        ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
        ssl_prefer_server_ciphers on;

        root /var/www/gpt/open.jgmao.com;
        index  index.php index.html index.htm;
        
	location /xcx/
	{
		root /data/www/open.jgmao.com;
	}


        location = /api/core/app/list
        {
                default_type application/json;
                if ($http_user_agent ~* "MicroMessenger") {
                        return 200 '{"code":200,"statusText":"","message":"","data":[{"_id":"65fa3eb56121b516aad12539","avatar":"https://meta001.oss-cn-zhangjiakou.aliyuncs.com/def/6e593202403161528257560.png","bg":"","name":"坚果猫AI","intro":"轻松创建您的智能分身","isOwner":false,"permission":"share","updateTime":"2024-03-20T01:41:09.535Z"}]}';
                }
                proxy_pass http://127.0.0.1:4001;
		proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header REMOTE-HOST $remote_addr;
        }
        location /
        {
                proxy_pass http://127.0.0.1:4001;
		proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header REMOTE-HOST $remote_addr;
        }
	access_log  /var/log/nginx/open.jgmao.com.access.log header_auth;
        error_log  /var/log/nginx/open.jgmao.com.error.log;        
}
