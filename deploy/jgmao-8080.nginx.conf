server {
    listen 127.0.0.1:8080;
    server_name _;

    root /opt/jgmao-official-site-8080/dist;
    index index.html;

    access_log /var/log/nginx/jgmao-8080.access.log main;
    error_log /var/log/nginx/jgmao-8080.error.log;

    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /api/geo-score/submit {
        proxy_pass http://127.0.0.1:18788/geo-score;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header REMOTE-HOST $remote_addr;
        proxy_set_header Authorization "Bearer jgmao-local-shared-secret";
        proxy_read_timeout 300s;
    }

    location = /api/geo-report {
        proxy_pass http://127.0.0.1:18788/geo-report;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header REMOTE-HOST $remote_addr;
        proxy_set_header Authorization "Bearer jgmao-local-shared-secret";
        proxy_read_timeout 300s;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|txt|xml)$ {
        expires 12h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
